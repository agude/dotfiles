name: Test Install

on: [push, pull_request]

jobs:
  lint:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './'
          ignore_paths: zsh
          severity: error

  skill-tests:
    name: Skill Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats and tree
        run: sudo apt-get update && sudo apt-get install -y bats tree
      - name: Run Johnny Decimal tests
        run: bats llm/skills/johnny-decimal/tests/
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run PDF skill tests
        run: uv run llm/skills/pdf/tests/run.py

  install:
    name: Test Install on ${{ matrix.os }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y neovim zsh

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install neovim

    - name: Test install.sh under system Bash 3.2 (macOS)
      if: runner.os == 'macOS'
      run: /bin/bash ./install.sh

    - name: Run the installation script
      run: ./install.sh

    - name: Test idempotency
      run: ./install.sh

    - name: Test nvim startup
      run: nvim +qall

    - name: Test bashrc (interactive)
      run: bash -i -c 'exit 0'

    - name: Test zshrc (interactive)
      run: zsh -i -c 'exit 0'
