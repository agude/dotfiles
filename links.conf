# Dotfiles Link Map
#
# Format:  target | source | groups
#   - target: where the symlink is created (variables expanded at runtime)
#   - source: path relative to the dotfiles repo root
#   - groups: comma-separated install groups (* = unconditional)
#
# install.sh reads this file and calls link() for each enabled row.
# Procedural tasks (plugin install, service setup, glob loops) stay in
# install.sh — this file only covers simple symlinks.

# ─── Shell ────────────────────────────────────────────────────────────────────
${HOME}/.bashrc              | bash/bashrc        | shell
${HOME}/.bash_profile        | bash/bashrc        | shell
${HOME}/.bash_login          | bash/bashrc        | shell
${HOME}/.bashrc.d            | bash/bashrc.d      | shell
${HOME}/.bash_logout         | bash/bash_logout   | shell
${HOME}/.bashrc.profiler     | bash/bashrc.profiler | shell
${HOME}/.zshrc               | zsh/zshrc          | shell
${HOME}/.zshrc.d             | zsh/zshrc.d        | shell
${HOME}/.sharedrc.d          | shared/sharedrc.d  | shell

# ─── Core (always installed) ─────────────────────────────────────────────────
${HOME}/.terminfo            | terminfo           | *
${HOME}/.astylerc            | astyle/astylerc     | *

# ─── GUI ──────────────────────────────────────────────────────────────────────
${HOME}/.Xmodmap             | xmodmap/Xmodmap    | gui

# ─── XDG config directories ──────────────────────────────────────────────────
${XDG_CONFIG_HOME}/ghostty   | config/ghostty     | gui
${XDG_CONFIG_HOME}/git       | config/git         | git
${XDG_CONFIG_HOME}/readline  | config/readline    | shell
${XDG_CONFIG_HOME}/screen    | config/screen      | shell

# ─── Vim / Neovim ────────────────────────────────────────────────────────────
${HOME}/.vim                 | vim                | vim
${HOME}/.vimrc               | vim/vimrc          | vim
${HOME}/.gvimrc              | vim/gvimrc         | vim
${HOME}/.ideavimrc           | vim/ideavimrc      | vim
${XDG_CONFIG_HOME}/nvim      | vim                | vim

# ─── LLM tools ───────────────────────────────────────────────────────────────
${HOME}/.claude/settings.json         | ${CLAUDE_SETTINGS_REL}           | llm
${HOME}/.claude/CLAUDE.md             | ${CLAUDE_AGENTS_REL}             | llm
${HOME}/.claude/statusline-command.sh | llm/claude/statusline-command.sh | llm
${HOME}/.gemini/settings.json | ${GEMINI_SETTINGS_REL}  | llm
${HOME}/.gemini/GEMINI.md     | ${GEMINI_AGENTS_REL}    | llm
${XDG_CONFIG_HOME}/opencode/opencode.json | llm/opencode/opencode.json | llm
